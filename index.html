   <div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin:6px 0 4px">Actors — check the ones this tweet is about</div>${ah}</div></div>`;}
function collect(){const d=DATA[i],m=d.m,o={topic:gv('topic'),actors:{}};let agreed=0,total=0;
 const cmp=(rv,mv)=>{total++;if(String(rv||"")===String(mv||""))agreed++;};cmp(o.topic,m.topic);
 ACT.forEach(a=>{const rMen=document.getElementById('men_'+a).checked,md=m.actors[a],mMen=!!md;
   if(rMen)o.actors[a]={f:gv('f_'+a),g:gv('g_'+a),p:gv('p_'+a),b:gv('b_'+a),sep:document.getElementById('sep_'+a).checked};
   if(rMen||mMen){cmp(rMen,mMen);if(rMen&&mMen){cmp(o.actors[a].f,md.f);cmp(o.actors[a].g,md.g);cmp(o.actors[a].p,md.p);cmp(o.actors[a].b,md.b);}}});
 return {o,agreed,total};}
function commitNext(){const d=DATA[i];const{o,agreed,total}=collect();R[d.pid]={rev:o,agreed,total,changed:total-agreed};save();i=firstTodo();render();}
function skip(){let n=i+1;while(n<DATA.length&&R[DATA[n].pid])n++;i=Math.min(n,DATA.length);render();}
function back(){let p=-1;for(let k=Math.min(i,DATA.length)-1;k>=0;k--){if(R[DATA[k].pid]){p=k;break;}}if(p<0){if(i>0)i--;}else{delete R[DATA[p].pid];save();i=p;}render();}
function showDone(){document.getElementById('cardwrap').style.display='none';document.getElementById('abar').style.display='none';stats();
 document.getElementById('donewrap').style.display='block';document.getElementById('donewrap').innerHTML=`<div class="done"><div class="big">${Object.keys(R).length}/${DATA.length} reviewed ✓</div><p>% correct (matched the model): <b>${document.getElementById('agr').textContent}</b></p><button class="dl" onclick="exportCSV()">Download CSV</button></div>`;}
document.getElementById('rev').addEventListener('input',e=>{REV=e.target.value;localStorage.setItem('btn_v6_r100_rev',REV);});
document.addEventListener('keydown',e=>{if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;if(e.key==='Enter')commitNext();else if(e.key==='s'||e.key==='S')skip();else if(e.key==='ArrowLeft')back();});
function exportCSV(){const cols=["pid","date","reviewer","changed","agreed","total","primary_topic"];
 ACT.forEach(a=>["mentioned","framing","government_framing","people_framing","people_sep","blame"].forEach(s=>cols.push(a+"_"+s)));
 const rows=[cols.join(",")];
 DATA.forEach(d=>{const r=R[d.pid];if(!r)return;const rv0=r.rev;
   const rec={pid:d.pid,date:d.date,reviewer:REV,changed:r.changed,agreed:r.agreed,total:r.total,primary_topic:rv0.topic};
   ACT.forEach(a=>{const rv=rv0.actors[a]||null;
     rec[a+"_mentioned"]=rv?"True":"False";rec[a+"_framing"]=rv?rv.f:"";rec[a+"_government_framing"]=rv?rv.g:"";rec[a+"_people_framing"]=rv?rv.p:"";rec[a+"_people_sep"]=rv?(rv.sep?"True":"False"):"";rec[a+"_blame"]=rv?rv.b:"";});
   rows.push(cols.map(c=>{let v=(rec[c]==null?"":String(rec[c]));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(","));});
 const b=new Blob([rows.join("\n")],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="BTN_v6_r100_review_"+((REV||"reviewer").replace(/[^a-z0-9]/gi,'_'))+".csv";a.click();}
i=firstTodo();render();
</script></body></html>
